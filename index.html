<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Trust Wallet Multi Asset Dashboard</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

</head>

<body>

<div class="container">

<!-- TOP BAR -->
<div class="topbar">

<button id="connectBtn" class="mainBtn">
Connect DApp
</button>

</div>

<!-- NETWORK WARNING MODAL -->
<div id="networkModal" class="modal hidden">

<div class="modalContent">

<h2>
Wrong Network Selected
</h2>

<p>
Select Ethereum Mainnet
</p>

<div class="modalActions">

<button id="cancelNetwork" class="dangerBtn">
Cancel
</button>

<button id="switchNetwork" class="mainBtn">
Select Network
</button>

</div>

</div>

</div>

<!-- SHIB MAIN CARD -->
<div class="card">

<div class="assetRow">

<div class="assetInfo">

<img
src="https://cryptologos.cc/logos/shiba-inu-shib-logo.png"
class="tokenLogo"
>

<div>

<h3>
SHIBA INU
</h3>

<p>
Current SHIB Balance
</p>

</div>

</div>

<div>

<h3 id="shibUsd">
$0.00
</h3>

</div>

</div>

<h1 id="shibBalance">
0 SHIB
</h1>

<div class="buttonRow">

<!-- SEND -->
<button class="actionBtn" id="sendBtn">

<svg viewBox="0 0 24 24">
<path d="M2 21l21-9L2 3v7l15 2-15 2z"></path>
</svg>

Send

</button>

<!-- RECEIVE -->
<button class="actionBtn" id="receiveBtn">

<svg viewBox="0 0 24 24">
<path d="M12 2v14m0 0l-5-5m5 5l5-5"></path>
</svg>

Receive

</button>

</div>

</div>

<!-- PENDING SHIB -->
<div id="pendingBox" class="card hidden">

<div class="assetInfo">

<img
src="https://cryptologos.cc/logos/shiba-inu-shib-logo.png"
class="tokenLogo"
>

<div>

<h3>
Pending SHIB
</h3>

<p>
1000 SHIB Incoming
</p>

</div>

</div>

<button id="viewPending" class="mainBtn">
View Details
</button>

</div>

<!-- OTHER ASSETS -->
<h2 class="sectionTitle">
Other Assets
</h2>

<div id="assetList"></div>

<!-- TRANSACTION HISTORY -->
<h2 class="sectionTitle">
Transaction History
</h2>

<div id="txList"></div>

</div>

<!-- RECEIVE MODAL -->
<div id="receiveModal" class="modal hidden">

<div class="modalContent">

<button class="backBtn closeReceive">

<svg viewBox="0 0 24 24">
<path d="M15 18l-6-6 6-6"></path>
</svg>

Back

</button>

<h2>
Receive Asset
</h2>

<div class="qrWrap">

<img id="qrCode" src="">

</div>

<p id="walletAddress"></p>

<button id="copyAddress" class="mainBtn">
Copy Address
</button>

</div>

</div>

<!-- ASSET MODAL -->
<div id="assetModal" class="modal hidden">

<div class="modalContent">

<button class="backBtn closeAsset">

<svg viewBox="0 0 24 24">
<path d="M15 18l-6-6 6-6"></path>
</svg>

Back

</button>

<h2 id="assetTitle"></h2>

<iframe id="chartFrame"></iframe>

<div id="assetTransactions"></div>

</div>

</div>

<!-- PENDING MODAL -->
<div id="pendingModal" class="modal hidden">

<div class="modalContent">

<button class="backBtn closePending">

<svg viewBox="0 0 24 24">
<path d="M15 18l-6-6 6-6"></path>
</svg>

Back

</button>

<div class="assetInfo">

<img
src="https://cryptologos.cc/logos/shiba-inu-shib-logo.png"
class="tokenLogo"
>

<div>

<h2>
Pending SHIB
</h2>

</div>

</div>

<p>
Amount: 1000 SHIB
</p>

<p>
Status: Awaiting Confirmation
</p>

<p>
From: 0xAbc123...Manual
</p>

</div>

</div>

<!-- JAVASCRIPT FILES -->
<script src="tokens.js"></script>
<script src="wallet.js"></script>
<script src="transactions.js"></script>
<script src="modals.js"></script>
<script src="app.js"></script>

</body>

</html>
