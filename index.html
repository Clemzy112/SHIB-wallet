<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SHIB Multi Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.container{max-width:520px;margin:auto;padding:16px;}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.btn{
background:#00ff88;
border:none;
padding:10px 14px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.disconnect{background:#ff3b3b;color:white;}

.card{
background:#151515;
padding:15px;
border-radius:16px;
margin-top:12px;
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
}

.tokenLogo{
width:32px;
height:32px;
border-radius:50%;
}

.balanceTitle{font-size:16px;margin-top:10px;}
.balanceBig{font-size:26px;font-weight:bold;}
.usd{color:#00ff88;margin-top:4px;}

.actionRow{
display:flex;
gap:10px;
margin-top:10px;
}

.iconBtn{
flex:1;
padding:10px;
border-radius:10px;
border:none;
background:#222;
color:white;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

svg{width:18px;height:18px;fill:white;}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
overflow:auto;
}

.modalContent{
padding:15px;
}

iframe{
width:100%;
height:420px;
border:none;
border-radius:12px;
margin-top:10px;
}

.backBtn{
width:100%;
padding:12px;
background:#222;
border:none;
color:white;
border-radius:10px;
margin-top:10px;
display:flex;
justify-content:center;
gap:8px;
align-items:center;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">

<button id="connectBtn" class="btn" onclick="toggleWallet()">
Connect DApp
</button>

</div>

<!-- SHIB MAIN -->
<div class="card" id="shibCard">

<div class="row">
<img class="tokenLogo" src="https://cryptologos.cc/logos/shiba-inu-shib-logo.png">
<strong>SHIBA INU</strong>
<span id="shibUsd">$0.00</span>
</div>

<div class="balanceTitle">Current SHIB Balance</div>
<div class="balanceBig" id="shibBalance">0 SHIB</div>

<div class="actionRow">

<button class="iconBtn" onclick="sendToken()">
<svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
Send
</button>

<button class="iconBtn" onclick="receiveToken()">
<svg viewBox="0 0 24 24"><path d="M12 2v14m0 0l-5-5m5 5l5-5"/></svg>
Receive
</button>

</div>

</div>

<!-- PENDING (HIDDEN UNTIL CONNECTED) -->
<div class="card" id="pendingCard" style="display:none;">

<div class="row">
<img class="tokenLogo" src="https://cryptologos.cc/logos/shiba-inu-shib-logo.png">
<strong>Pending SHIB</strong>
</div>

<p>1000 SHIB Incoming</p>

<button class="btn" onclick="openPending()">View Details</button>

</div>

<!-- OTHER ASSETS -->
<h3>Other Assets</h3>

<div class="card" onclick="openAsset('ETH')">
<div class="row">
<img class="tokenLogo" src="https://cryptologos.cc/logos/ethereum-eth-logo.png">
<span>ETH</span>
</div>
</div>

<div class="card" onclick="openAsset('USDT')">
<div class="row">
<img class="tokenLogo" src="https://cryptologos.cc/logos/tether-usdt-logo.png">
<span>USDT</span>
</div>
</div>

</div>

<!-- ASSET MODAL -->
<div class="modal" id="assetModal">
<div class="modalContent">

<h2 id="assetTitle"></h2>

<iframe id="chart"></iframe>

<button class="backBtn" onclick="closeAsset()">

<svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
Back

</button>

</div>
</div>

<!-- PENDING MODAL -->
<div class="modal" id="pendingModal">
<div class="modalContent">

<h2>Pending SHIB</h2>

<p>Amount: 1000 SHIB</p>
<p>Status: Awaiting Confirmation</p>

<p>From: 0xAbc123...Manual</p>

<button class="backBtn" onclick="closePending()">

<svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
Back

</button>

</div>
</div>

<script>

let provider, signer, user;
let connected = false;

const SHIB = "0x95aD61b0a150d79219dCF64E1E6Cc01f0B64C4cE";

const abi = [
"function balanceOf(address) view returns (uint256)",
"function decimals() view returns (uint8)"
];

async function toggleWallet(){

if(!connected){
await connect();
} else {
disconnect();
}

}

async function connect(){

if(!window.ethereum){
alert("Open Trust Wallet DApp browser");
return;
}

provider = new ethers.providers.Web3Provider(window.ethereum);

await provider.send("eth_requestAccounts", []);

await switchToETH();

signer = provider.getSigner();
user = await signer.getAddress();

connected = true;

document.getElementById("connectBtn").innerText = "Disconnect";

document.getElementById("pendingCard").style.display = "block";

loadSHIB();

}

async function switchToETH(){

try{
await window.ethereum.request({
method:"wallet_switchEthereumChain",
params:[{chainId:"0x1"}]
});
}catch(e){
console.log("Switch network manually");
}
}

function disconnect(){

connected = false;
user = null;

document.getElementById("connectBtn").innerText = "Connect DApp";

document.getElementById("pendingCard").style.display = "none";

document.getElementById("shibBalance").innerText = "0 SHIB";
document.getElementById("shibUsd").innerText = "$0.00";

}

async function loadSHIB(){

const contract = new ethers.Contract(SHIB, abi, provider);

const decimals = await contract.decimals();
const bal = await contract.balanceOf(user);

const formatted = ethers.utils.formatUnits(bal, decimals);

document.getElementById("shibBalance").innerText =
Number(formatted).toLocaleString() + " SHIB";

document.getElementById("shibUsd").innerText =
"$" + (Number(formatted) * 0.00001).toFixed(2);

}

function openAsset(type){

document.getElementById("assetModal").style.display="block";

if(type==="ETH"){
document.getElementById("chart").src =
"https://dexscreener.com/ethereum/0xC02aaa39b223fe8d0a0e5c4f27ead9083c756cc2?embed=1";
}

if(type==="USDT"){
document.getElementById("chart").src =
"https://dexscreener.com/ethereum/0xdac17f958d2ee523a2206206994597c13d831ec7?embed=1";
}

document.getElementById("assetTitle").innerText = type;

}

function closeAsset(){
document.getElementById("assetModal").style.display="none";
}

function openPending(){
document.getElementById("pendingModal").style.display="block";
}

function closePending(){
document.getElementById("pendingModal").style.display="none";
}

function sendToken(){
alert("Send triggered (connect real contract here)");
}

function receiveToken(){
alert("Receive address copied (connect wallet address)");
}

</script>

</body>
</html>
