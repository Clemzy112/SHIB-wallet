<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SHIB DApp Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.container{
max-width:520px;
margin:auto;
padding:18px;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.btn{
background:#00ff88;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.disconnect{
background:#ff3b3b;
color:white;
}

/* CARD */
.card{
background:#151515;
padding:15px;
border-radius:18px;
margin-top:12px;
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
}

.tokenLogo{
width:32px;
height:32px;
border-radius:50%;
margin-right:10px;
}

/* BALANCE */
.balanceTitle{
font-size:18px;
margin-top:10px;
}

.balanceBig{
font-size:28px;
font-weight:bold;
}

.usd{
color:#00ff88;
margin-top:4px;
}

/* BUTTONS */
.actionRow{
display:flex;
gap:10px;
margin-top:10px;
}

.iconBtn{
flex:1;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
padding:10px;
border-radius:10px;
border:none;
cursor:pointer;
background:#222;
color:white;
}

.icon{
width:18px;
height:18px;
fill:white;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
overflow:auto;
}

.modalContent{
padding:15px;
}

iframe{
border:none;
width:100%;
height:420px;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
<button id="connectBtn" class="btn" onclick="connectWallet()">Connect DApp</button>
</div>

<!-- SHIB MAIN -->
<div class="card">

<div class="row">
<img class="tokenLogo" src="https://cryptologos.cc/logos/shiba-inu-shib-logo.png">
<strong>SHIBA INU</strong>
<span id="shibUsd">$0.00</span>
</div>

<div class="balanceTitle">Current SHIB Balance</div>
<div class="balanceBig" id="shibBalance">0 SHIB</div>

<div class="actionRow">

<button class="iconBtn">
<svg class="icon" viewBox="0 0 24 24">
<path d="M12 2L3 7v10l9 5 9-5V7l-9-5zm0 2.2L19 7l-7 3.8L5 7l7-2.8z"/>
</svg>
Send
</button>

<button class="iconBtn">
<svg class="icon" viewBox="0 0 24 24">
<path d="M12 2v20m0 0l6-6m-6 6l-6-6"/>
</svg>
Receive
</button>

</div>

</div>

<!-- PENDING -->
<div class="card">
<div class="row">
<img class="tokenLogo" src="https://cryptologos.cc/logos/shiba-inu-shib-logo.png">
<strong>Pending SHIB</strong>
</div>

<p>1000 SHIB Incoming</p>

<button class="btn" onclick="openModal()">View Details</button>
</div>

<!-- OTHER ASSETS -->
<h3>Other Assets</h3>

<div class="card" onclick="openAsset('ETH')">
ETH
</div>

<div class="card" onclick="openAsset('USDT')">
USDT (ERC20)
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">

<div class="modalContent">

<h2 id="assetTitle">Asset</h2>

<iframe id="chart"></iframe>

<div class="actionRow">
<button class="iconBtn">Send</button>
<button class="iconBtn">Receive</button>
</div>

<button class="btn" onclick="closeModal()">Close</button>

</div>

</div>

<!-- PENDING MODAL -->
<div id="pendingModal" class="modal">

<div class="modalContent">

<h2>Pending SHIB</h2>

<p>Amount: 1000 SHIB</p>
<p>Status: Awaiting Confirmation...</p>
<p>From: 0xAbc123...Manual</p>

<button class="btn" onclick="confirmDeposit()">
Confirm Deposit
</button>

<button class="btn" onclick="closePending()">
Close
</button>

</div>

</div>

<script>

let provider, signer, user;

const SHIB = "0x95aD61b0a150d79219dCF64E1E6Cc01f0B64C4cE";

const abi = [
"function balanceOf(address) view returns (uint256)",
"function decimals() view returns (uint8)"
];

async function connectWallet(){

if(!window.ethereum){
alert("Open in Trust Wallet DApp browser");
return;
}

provider = new ethers.providers.Web3Provider(window.ethereum);
await provider.send("eth_requestAccounts", []);
signer = provider.getSigner();
user = await signer.getAddress();

document.getElementById("connectBtn").innerText = "Disconnect";

loadSHIB();
}

async function loadSHIB(){

const contract = new ethers.Contract(SHIB, abi, provider);

const decimals = await contract.decimals();
const bal = await contract.balanceOf(user);

const formatted = ethers.utils.formatUnits(bal, decimals);

document.getElementById("shibBalance").innerText =
Number(formatted).toLocaleString() + " SHIB";

document.getElementById("shibUsd").innerText =
"$" + (Number(formatted) * 0.00001).toFixed(2);
}

function openModal(){
document.getElementById("pendingModal").style.display="block";
}

function closePending(){
document.getElementById("pendingModal").style.display="none";
}

function confirmDeposit(){
window.location.href="/dark.html";
}

/* ASSET CHARTS */
function openAsset(asset){

document.getElementById("modal").style.display="block";

let url = "";

if(asset === "ETH"){
url = "https://dexscreener.com/ethereum/0xC02aaa39b223fe8d0a0e5c4f27ead9083c756cc2?embed=1";
}

if(asset === "USDT"){
url = "https://dexscreener.com/ethereum/0xdac17f958d2ee523a2206206994597c13d831ec7?embed=1";
}

document.getElementById("chart").src = url;
document.getElementById("assetTitle").innerText = asset;

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
