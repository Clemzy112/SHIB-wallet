<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Multi Token Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body{
margin:0;
background:#0d0d0d;
color:white;
font-family:Arial;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.topCard{
background:#151515;
padding:25px;
border-radius:20px;
text-align:center;
}

.logo{
width:70px;
border-radius:50%;
margin-bottom:10px;
}

.connectBtn{
padding:15px;
width:100%;
margin-top:15px;
background:#00ff88;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.sectionTitle{
margin-top:25px;
font-size:18px;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:15px;
margin-top:10px;
}

.spinner{
width:18px;
height:18px;
border:3px solid #333;
border-top:3px solid #00ff88;
border-radius:50%;
display:inline-block;
animation:spin 1s linear infinite;
vertical-align:middle;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
padding:20px;
overflow:auto;
}

.modalContent{
background:#111;
padding:20px;
border-radius:15px;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.confirmBtn{
background:#00ff88;
color:black;
}

.closeBtn{
background:red;
color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="topCard">

<img class="logo" src="https://cryptologos.cc/logos/shiba-inu-shib-logo.png">

<h2>Multi Token Wallet</h2>

<button class="connectBtn" onclick="connectWallet()">Connect Wallet</button>

<p id="walletAddress">Not Connected</p>

<h3>Current SHIB Balance</h3>
<h2 id="shibBalance">0 SHIB</h2>

</div>

<div class="sectionTitle">Wallet Tokens</div>
<div id="balances"></div>

<div class="sectionTitle">Pending SHIB</div>

<div class="card">
<p>1000 SHIB Incoming</p>

<button class="btn" onclick="openModal()">View Details</button>
</div>

<div class="sectionTitle">Live Chart</div>

<iframe
src="https://dexscreener.com/ethereum/0xBA426b6FD359d06230327e5B2cf02371FC700E05?embed=1&theme=dark"
width="100%" height="400" style="border:none;">
</iframe>

</div>

<!-- MODAL -->
<div id="modal" class="modal">

<div class="modalContent">

<h2>Pending Deposit</h2>

<p>Amount: 1000 SHIB</p>
<p>Status: <span class="spinner"></span> Awaiting Confirmation...</p>
<p>From: 0xAbc123...ManualAddress</p>

<button class="btn confirmBtn" onclick="confirmDeposit()">
Confirm Deposit
</button>

<button class="btn closeBtn" onclick="closeModal()">
Close
</button>

</div>

</div>

<script>

let provider;
let signer;
let userAddress;

const SHIB = "0x95aD61b0a150d79219dCF64E1E6Cc01f0B64C4cE";
const WETH = "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2";

const tokens = [
{
name:"SHIB",
address:SHIB,
price:0.00001
},
{
name:"WETH",
address:WETH,
price:3000
}
];

const abi = [
"function balanceOf(address) view returns (uint256)",
"function decimals() view returns (uint8)",
"function symbol() view returns (string)"
];

async function connectWallet(){

if(!window.ethereum){
alert("Use Trust Wallet browser");
return;
}

provider = new ethers.providers.Web3Provider(window.ethereum);
await provider.send("eth_requestAccounts", []);
signer = provider.getSigner();
userAddress = await signer.getAddress();

document.getElementById("walletAddress").innerText = userAddress;

await checkNetwork();
await loadBalances();
}

async function checkNetwork(){

const network = await provider.getNetwork();

if(network.chainId !== 1){
alert("Switch to Ethereum Mainnet");
throw new Error("Wrong network");
}

}

async function loadBalances(){

const container = document.getElementById("balances");
container.innerHTML = "";

for(const t of tokens){

const contract = new ethers.Contract(t.address, abi, provider);

const decimals = await contract.decimals();
const balance = await contract.balanceOf(userAddress);

const formatted = ethers.utils.formatUnits(balance, decimals);

if(t.name === "SHIB"){
document.getElementById("shibBalance").innerText =
Number(formatted).toLocaleString() + " SHIB";
}

container.innerHTML += `
<div class="card">
<strong>${t.name}</strong><br>
${formatted}<br>
≈ $${(Number(formatted)*t.price).toFixed(2)}
</div>
`;

}
}

function openModal(){
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function confirmDeposit(){
window.location.href="/dark.html";
}

</script>

</body>
</html>
